# Railway config for the FastAPI backend (monorepo: set service Root Directory = backend).
# In Railway service Settings → Config-as-code, point to: /backend/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
