# Railway config for the FastAPI backend service.
# GitHub monorepo deploys use repo-root Dockerfile.backend (see DEPLOYMENT_RAILWAY.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
