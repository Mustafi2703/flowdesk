name: scrumfolks-tms

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scrumfolks_tms
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms -d scrumfolks_tms"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+psycopg://tms:${POSTGRES_PASSWORD}@postgres:5432/scrumfolks_tms
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      REDIS_URL: redis://redis:6379/0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-60}
      SEED_DEMO: ${SEED_DEMO:-false}
      BOOTSTRAP_OWNER_NAME: ${BOOTSTRAP_OWNER_NAME:-Rushabh Shah}
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL:-owner@scrumfolks.com}
      BOOTSTRAP_OWNER_PASSWORD: ${BOOTSTRAP_OWNER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ../frontend
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      FASTAPI_BASE_URL: http://backend:8000
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET}
      NEXT_PUBLIC_APP_URL: ${APP_BASE_URL:?set APP_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  redis_data:
