# Scrumfolks TMS — end-to-end Docker Compose stack.
#
# Brings up:
#   - postgres   → primary datastore for the FastAPI backend
#   - backend    → FastAPI + alembic migrations + seed
#   - frontend   → Next.js UI (proxies /api/* to the backend)
#
# Both backend and frontend share JWT_SECRET so the same sf_sess cookie
# is verified on both servers. The Postgres data persists on a named
# volume so re-running `docker compose up` is safe.

services:
  postgres:
    image: postgres:16-alpine
    container_name: scrumfolks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scrumfolks_tms
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrumfolks-demo-pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms -d scrumfolks_tms"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: scrumfolks-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_BASE_URL: http://127.0.0.1:3000
      ALLOWED_HOSTS: '["127.0.0.1","localhost","backend"]'
      ALLOWED_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000"]'
      JWT_SECRET: ${JWT_SECRET:-scrumfolks-demo-jwt-secret-please-change-in-prod}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: 10080
      CRON_SECRET: ${CRON_SECRET:-scrumfolks-demo-cron-secret}
      COOKIE_NAME: sf_sess
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      DATABASE_URL: postgresql+psycopg://tms:${POSTGRES_PASSWORD:-scrumfolks-demo-pw}@postgres:5432/scrumfolks_tms
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 10
      REDIS_URL: redis://127.0.0.1:6379/0
      EMAIL_PROVIDER: console
      EMAIL_FROM: "Scrumfolks TMS <noreply@scrumfolks.com>"
      ENABLE_SCHEDULER: "false"
      SEED_DEMO: "true"
      SEED_PASSWORD: scrumfolks2026
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: scrumfolks-frontend
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-scrumfolks-demo-jwt-secret-please-change-in-prod}
      FASTAPI_BASE_URL: http://backend:8000
      CRON_SECRET: ${CRON_SECRET:-scrumfolks-demo-cron-secret}
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
